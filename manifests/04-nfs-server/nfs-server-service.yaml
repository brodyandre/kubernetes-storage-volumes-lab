# Service interno (ClusterIP) para expor o servidor NFS no cluster.
apiVersion: v1
kind: Service
metadata:
  name: nfs-server
  namespace: storage-lab
  labels:
    app: nfs-server
    app.kubernetes.io/name: kubernetes-storage-volumes-lab
    app.kubernetes.io/component: nfs-server-lab
spec:
  type: ClusterIP
  selector:
    app: nfs-server
  ports:
    - name: nfs
      port: 2049
      targetPort: 2049
      protocol: TCP

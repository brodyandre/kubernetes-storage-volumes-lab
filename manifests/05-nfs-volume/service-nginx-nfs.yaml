# Service para testar o deployment nginx-nfs-demo.
apiVersion: v1
kind: Service
metadata:
  name: nginx-nfs-demo
  namespace: storage-lab
  labels:
    app: nginx-nfs-demo
    app.kubernetes.io/name: kubernetes-storage-volumes-lab
    app.kubernetes.io/component: nfs-pv-pvc-lab
spec:
  type: ClusterIP
  selector:
    app: nginx-nfs-demo
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP

# Pod de demonstração que monta ConfigMap como volume em /etc/config.
apiVersion: v1
kind: Pod
metadata:
  name: pod-configmap-volume-demo
  namespace: storage-lab-config
  labels:
    app: pod-configmap-volume-demo
    app.kubernetes.io/name: kubernetes-storage-volumes-lab
    app.kubernetes.io/component: configmap-volume-lab
spec:
  containers:
    - name: app
      image: busybox:1.36.1
      command: ["/bin/sh", "-c"]
      args:
        - |
          # Mantém o container vivo para testes com kubectl exec.
          sleep 3600
      volumeMounts:
        - name: app-config-volume
          mountPath: /etc/config
          readOnly: true
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
  volumes:
    - name: app-config-volume
      configMap:
        name: app-config

# Pod de demonstração que monta Secret como volume em /etc/secret.
apiVersion: v1
kind: Pod
metadata:
  name: pod-secret-volume-demo
  namespace: storage-lab-config
  labels:
    app: pod-secret-volume-demo
    app.kubernetes.io/name: kubernetes-storage-volumes-lab
    app.kubernetes.io/component: secret-volume-lab
spec:
  containers:
    - name: app
      image: busybox:1.36.1
      command: ["/bin/sh", "-c"]
      args:
        - |
          # Mantém o container ativo para testes com kubectl exec.
          sleep 3600
      volumeMounts:
        - name: app-secret-volume
          mountPath: /etc/secret
          readOnly: true
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
  volumes:
    - name: app-secret-volume
      secret:
        secretName: app-secret

# Pod de demonstração consumindo um PVC já vinculado a um PV.
apiVersion: v1
kind: Pod
metadata:
  name: pod-pvc-demo
  namespace: storage-lab
  labels:
    app: pod-pvc-demo
    app.kubernetes.io/name: kubernetes-storage-volumes-lab
    app.kubernetes.io/component: pv-pvc-lab
spec:
  containers:
    - name: writer
      image: busybox:1.36.1
      command: ["/bin/sh", "-c"]
      args:
        - |
          # Cria o arquivo na primeira execução.
          if [ ! -f /data/message.txt ]; then
            echo "Mensagem persistente criada pelo pod-pvc-demo" > /data/message.txt;
          fi
          # Adiciona evidência de inicialização para testar persistência.
          echo "$(date) - pod iniciado e usando PVC" >> /data/message.txt;
          # Mantém o Pod em execução.
          while true; do sleep 3600; done
      volumeMounts:
        - name: pvc-storage
          mountPath: /data
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
  volumes:
    - name: pvc-storage
      persistentVolumeClaim:
        claimName: pvc-hostpath-demo
